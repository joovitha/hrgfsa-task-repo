name: Deploy to GKE via Docker Hub

on:
  push:
    branches: 
      - "main"
    paths-ignore:
      - "README.md"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g., v1.0.0)"
        required: true
        default: "latest"
      build:
        description: "Build new docker image or not"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC
      contents: read    # Required to checkout code

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Authenticate to GCP using Workload Identity Federation
    - name: Authenticate to GCP via WIF
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_POOL_ID }}/providers/${{ secrets.GCP_PROVIDER_ID }}
        service_account: ${{ secrets.GCP_SA_EMAIL }}
        create_credentials_file: true
        export_environment_variables: true

    # Install gcloud SDK
    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        install_components: 'gke-gcloud-auth-plugin'

    # Configure GKE credentials
    - name: Configure GKE credentials
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
      run: |
        gcloud container clusters get-credentials devops-cluster \
          --region us-central1 \
          --project ${{ secrets.GCP_PROJECT_ID }}

    # Login to Docker Hub
    - name: Login to Docker Hub
      run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

    - name: Set image variables
      run: |
        IMAGE_NAME="devops-app"
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          BUILD_FLAG="${{ github.event.inputs.build }}"
        else
          IMAGE_TAG="v${{ github.run_number }}"
          BUILD_FLAG="true" 
        fi
        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "BUILD_FLAG=$BUILD_FLAG" >> $GITHUB_ENV

    - name: Debug inputs
      run: |
        echo "Username: ${{ secrets.DOCKERHUB_USERNAME }}"
        echo "Image name: $IMAGE_NAME"
        echo "Image tag: $IMAGE_TAG"
        echo "Build flag: $BUILD_FLAG"

    - name: Build and Push Docker Image
      if: env.BUILD_FLAG == 'true'
      run: |
        IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        docker build -t $IMAGE ./app
        docker push $IMAGE

    - name: Use Existing Docker Image
      if: env.BUILD_FLAG == 'false'
      run: |
        IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: Deploy to GKE
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
      run: |
        kubectl apply -f k8s/
        kubectl set image deployment/${{ env.IMAGE_NAME }} app=${{ env.IMAGE }}
        kubectl rollout status deployment/${{ env.IMAGE_NAME }}